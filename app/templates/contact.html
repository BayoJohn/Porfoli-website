{% extends "base.html" %}

{% block title %}Contact{% endblock %}

{% block content %}
    <div class="max-w-xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">Contact Me</h1>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="bg-green-50 border border-green-300 text-green-700 px-4 py-3 rounded-lg mb-6">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <div class="bg-white rounded-xl shadow-sm p-8">
            <form method="POST" class="flex flex-col gap-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">Name</label>
                    <input type="text" name="name" required
                        class="w-full border border-gray-200 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Email</label>
                    <input type="email" name="email" required
                        class="w-full border border-gray-200 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Message</label>
                    <textarea name="message" rows="5" required
                        class="w-full border border-gray-200 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400"></textarea>
                </div>
                <button type="submit"
                    class="bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition">
                    Send message
                </button>
            </form>
        </div>
    </div>
{% endblock %}
