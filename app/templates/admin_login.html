{% extends "base.html" %}

{% block title %}Admin Login{% endblock %}

{% block content %}
    <div class="max-w-sm mx-auto mt-20">
        <h1 class="text-3xl font-bold mb-8 text-center">Admin Login</h1>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="bg-red-50 border border-red-300 text-red-700 px-4 py-3 rounded-lg mb-6">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <div class="bg-white rounded-xl shadow-sm p-8">
            <form method="POST" class="flex flex-col gap-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">Password</label>
                    <input type="password" name="password" required
                        class="w-full border border-gray-200 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400">
                </div>
                <button type="submit"
                    class="bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition">
                    Login
                </button>
            </form>
        </div>
    </div>
{% endblock %}
