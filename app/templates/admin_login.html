{% extends "base.html" %}

{% block title %}Admin Login{% endblock %}

{% block content %}

    <div class="max-w-sm mx-auto mt-10">
        <h1 class="text-3xl font-extrabold mb-2">Admin <span class="gradient-text">Login</span></h1>
        <p class="text-gray-500 text-sm mb-8">Restricted area. Authorised personnel only.</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="bg-red-500/10 border border-red-500/20 text-red-400 px-4 py-3 rounded-xl mb-6">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8">
            <form method="POST" class="flex flex-col gap-5">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Password</label>
                    <input type="password" name="password" required autofocus
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-indigo-500 transition">
                </div>
                <button type="submit"
                    class="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-lg transition">
                    Sign in
                </button>
            </form>
        </div>
    </div>

{% endblock %}
