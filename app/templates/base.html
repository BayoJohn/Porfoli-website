<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Portfolio{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- Nav -->
    <nav class="bg-gray-900 text-white px-8 py-4 flex items-center gap-6">
        <a href="/" class="text-xl font-bold mr-auto">YourName</a>
        <a href="/" class="hover:text-indigo-400 transition">Home</a>
        <a href="/about" class="hover:text-indigo-400 transition">About</a>
        <a href="/projects" class="hover:text-indigo-400 transition">Projects</a>
        <a href="/blog" class="hover:text-indigo-400 transition">Blog</a>
        <a href="/contact" class="hover:text-indigo-400 transition">Contact</a>
    </nav>

    <!-- Page content -->
    <main class="max-w-4xl mx-auto px-6 py-12">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="text-center text-gray-400 text-sm py-8">
        © 2025 YourName. All rights reserved.
    </footer>

</body>
</html>
