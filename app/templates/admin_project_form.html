{% extends "admin_base.html" %}

{% block title %}{% if project %}Edit Project{% else %}New Project{% endif %}{% endblock %}

{% block content %}

    <div class="max-w-3xl mx-auto">
        <a href="/admin" class="text-gray-500 hover:text-gray-300 text-sm transition mb-8 inline-block">
            ← Back to dashboard
        </a>

        <h1 class="text-3xl font-extrabold mb-8">
            {% if project %}Edit <span class="gradient-text">Project</span>
            {% else %}New <span class="gradient-text">Project</span>{% endif %}
        </h1>

        <!-- EasyMDE CSS -->
        <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">

        <style>
            .editor-toolbar {
                background: #1f2937 !important;
                border: 1px solid #374151 !important;
                border-bottom: none !important;
                border-radius: 8px 8px 0 0 !important;
                opacity: 1 !important;
            }
            .editor-toolbar button {
                color: #9ca3af !important;
            }
            .editor-toolbar button:hover, .editor-toolbar button.active {
                background: #374151 !important;
                color: #6366f1 !important;
            }
            .editor-toolbar i.separator {
                border-left: 1px solid #374151 !important;
                border-right: 1px solid #111827 !important;
            }
            .EasyMDEContainer .CodeMirror {
                background: #111827 !important;
                border: 1px solid #374151 !important;
                border-radius: 0 0 8px 8px !important;
                color: #e5e7eb !important;
                font-size: 15px !important;
                min-height: 250px;
            }
            .editor-statusbar { display: none; }
        </style>

        <div class="glass-panel p-8">
            <form method="POST" enctype="multipart/form-data" id="project-form" class="flex flex-col gap-5">

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Title</label>
                    <input type="text" name="title" required
                        value="{{ project.title if project else '' }}"
                        class="w-full bg-white/5 border border-[rgba(255,255,255,0.08)] rounded-lg px-4 py-3 text-white focus:outline-none focus:border-indigo-500 transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Description (Markdown)</label>
                    <textarea name="description" id="markdown-editor">{{ project.description if project else '' }}</textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">
                        Tech Stack
                        <span class="text-gray-600 font-normal">(comma separated e.g. Python, Flask, Docker)</span>
                    </label>
                    <input type="text" name="tech_stack"
                        value="{{ project.tech_stack if project else '' }}"
                        class="w-full bg-white/5 border border-[rgba(255,255,255,0.08)] rounded-lg px-4 py-3 text-white focus:outline-none focus:border-indigo-500 transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">GitHub URL</label>
                    <input type="url" name="url"
                        value="{{ project.url if project else '' }}"
                        class="w-full bg-white/5 border border-[rgba(255,255,255,0.08)] rounded-lg px-4 py-3 text-white focus:outline-none focus:border-indigo-500 transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Cover Image</label>
                    {% if project and project.image %}
                        <img src="/static/uploads/{{ project.image }}"
                            class="w-full h-40 object-cover rounded-lg mb-3">
                    {% endif %}
                    <input type="file" name="image" accept="image/*"
                        class="w-full bg-white/5 border border-[rgba(255,255,255,0.08)] rounded-lg px-4 py-3 text-gray-400 focus:outline-none focus:border-indigo-500 transition">
                </div>

                <div class="flex gap-3 pt-2">
                    <button type="submit"
                        class="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-6 py-3 rounded-lg transition">
                        Save
                    </button>
                    <a href="/admin"
                        class="border border-gray-700 hover:border-gray-500 text-gray-400 font-medium px-6 py-3 rounded-lg transition">
                        Cancel
                    </a>
                </div>

            </form>
        </div>
    </div>

    <!-- EasyMDE script -->
    <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
    <script>
        var easymde = new EasyMDE({
            element: document.getElementById('markdown-editor'),
            spellChecker: false,
            placeholder: "Describe your project using Markdown...",
            status: false,
            toolbar: [
                "bold", "italic", "heading", "|",
                "quote", "unordered-list", "ordered-list", "|",
                "link", "image", "code", "|",
                "preview", "guide"
            ]
        });
    </script>

{% endblock %}
