{% extends "base.html" %}

{% block title %}{% if post %}Edit Post{% else %}New Post{% endif %}{% endblock %}

{% block content %}
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">
            {% if post %}Edit Post{% else %}New Post{% endif %}
        </h1>

        <div class="bg-white rounded-xl shadow-sm p-8">
            <form method="POST" class="flex flex-col gap-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">Title</label>
                    <input type="text" name="title" required
                        value="{{ post.title if post else '' }}"
                        class="w-full border border-gray-200 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Body</label>
                    <textarea name="body" rows="10" required
                        class="w-full border border-gray-200 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400">{{ post.body if post else '' }}</textarea>
                </div>
                <div class="flex gap-3">
                    <button type="submit"
                        class="bg-indigo-600 text-white py-2 px-6 rounded-lg font-semibold hover:bg-indigo-700 transition">
                        Save
                    </button>
                    <a href="/admin"
                        class="text-gray-400 py-2 px-4 rounded-lg hover:text-gray-600 transition">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
