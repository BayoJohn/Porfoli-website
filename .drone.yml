kind: pipeline
type: docker
name: deploy

clone:
  disable: true

steps:
  - name: clone-code
    image: alpine/git
    commands:
      - git clone http://172.17.0.1:3001/Bayo/Porfolio-website.git .
      - git checkout ${DRONE_COMMIT}

  - name: build-and-push
    image: plugins/docker
    settings:
      registry: 10.0.0.2
      repo: 10.0.0.2/library/portfolio
      tags:
        - latest
        - build-${DRONE_BUILD_NUMBER}
      username: admin
      password:
        from_secret: harbor_password
      dockerfile: Dockerfile
      insecure: true

  - name: update-k8s-manifest
    image: alpine/git
    environment:
      GITEA_TOKEN:
        from_secret: gitea_token
    commands:
      - git config --global user.email "drone@ci.local"
      - git config --global user.name "Drone CI"
      - git clone http://172.17.0.1:3001/Bayo/Porfolio-website.git /tmp/repo
      - cd /tmp/repo
      - sed -i "s|image: 10.0.0.2/library/portfolio:.*|image: 10.0.0.2/library/portfolio:build-${DRONE_BUILD_NUMBER}|g" k8s/deployment.yaml
      - git add k8s/deployment.yaml
      - git commit -m "update image to build-${DRONE_BUILD_NUMBER} [skip ci]"
      - git push http://Bayo:$GITEA_TOKEN@172.17.0.1:3001/Bayo/Porfolio-website.git