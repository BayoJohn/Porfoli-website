kind: pipeline
type: docker
name: deploy

steps:
  - name: clone
    image: alpine/git
    commands:
      - git clone http://172.17.0.1:3001/Bayo/Porfolio-website.git .
      - git checkout $DRONE_COMMIT

  - name: build-and-push
    image: plugins/docker
    settings:
      registry: 10.0.0.1:8888
      repo: 10.0.0.1:8888/library/portfolio
      tags: 
        - latest
        - build-${DRONE_BUILD_NUMBER}
      username: admin
      password:
        from_secret: harbor_password
      insecure: true # Necessary since Harbor is likely on HTTP inside the VPN

  - name: deploy-to-oracle
    image: appleboy/drone-ssh
    settings:
      host: 10.0.0.1 # This is your Oracle VPN IP we used for Portainer
      username: ubuntu
      key:
        from_secret: oracle_ssh_key # Your id_rsa content
      script:
        - echo "Logging into Harbor via VPN..."
        - docker login -u admin -p Harbor12345 10.0.0.1:8888
        - echo "Pulling Portfolio Image..."
        - docker pull 10.0.0.1:8888/library/portfolio:latest
        - docker stop portfolio || true
        - docker rm portfolio || true
        - echo "Starting Portfolio on Oracle..."
        - docker run -d --name portfolio -p 80:5000 --restart unless-stopped 10.0.0.1:8888/library/portfolio:latest