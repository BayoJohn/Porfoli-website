kind: pipeline
type: docker
name: deploy

clone:
  disable: true

steps:
  - name: clone-code
    image: alpine/git
    commands:
      - git clone http://172.17.0.1:3001/Bayo/Porfolio-website.git .
      - git checkout ${DRONE_COMMIT}

  - name: build-and-push
    image: plugins/docker
    settings:
      registry: 10.0.0.2
      repo: 10.0.0.2/library/portfolio
      tags:
        - latest
        - build-${DRONE_BUILD_NUMBER}
      username: admin
      password:
        from_secret: harbor_password
      dockerfile: Dockerfile
      insecure: true

  - name: deploy-to-kubernetes
    image: appleboy/drone-ssh
    settings:
      host: 10.0.0.1
      username: ubuntu
      key:
        from_secret: oracle_ssh_key
      port: 22
      script:
        - echo "Updating image tag in deployment..."
        - sudo kubectl set image deployment/portfolio portfolio=10.0.0.2/library/portfolio:latest -n portfolio
        - echo "Waiting for rollout to complete..."
        - sudo kubectl rollout status deployment/portfolio -n portfolio --timeout=120s
        - echo "Verifying pods..."
        - sudo kubectl get pods -n portfolio